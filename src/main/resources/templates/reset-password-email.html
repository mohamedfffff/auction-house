<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div style="font-family: sans-serif; padding: 20px;">
        <h2>Reset your password</h2>
        <p>Please click the button below to reset your password:</p>
        
        <a th:href="${resetPasswordUrl}" 
           style="background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block;">
           Reset my password
        </a>

        <p>If that doesn't work, copy this link: <br/>
           <span th:text="${resetPasswordUrl}">URL</span>
        </p>
    </div>
</body>
</html>
